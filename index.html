<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>L'Oréal | Smart Beauty Advisor</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="page-wrapper">
      <!-- Header / Branding -->
      <header class="site-header">
        <img src="img/loreal-logo.png" alt="L'Oréal Logo" class="loreal-logo" />
        <p class="site-subtitle">Smart Beauty Advisor</p>
      </header>

      <!-- Chat Area -->
      <main>
        <section class="chatbox">
          <!-- User question display (LevelUp) -->
          <div id="userQuestionDisplay" class="user-question-display"></div>

          <!-- Chat window with conversation bubbles (LevelUp) -->
          <div id="chatWindow" class="chat-window"></div>

          <form id="chatForm" class="chat-form">
            <label for="userInput" class="visually-hidden">Message</label>
            <input
              id="userInput"
              name="userInput"
              type="text"
              placeholder="Ask me about L'Oréal products or routines…"
              autocomplete="off"
              required
            />
            <button type="submit" id="sendBtn">
              <span class="material-icons">send</span>
              <span class="visually-hidden">Send</span>
            </button>
          </form>
        </section>
      </main>

      <!-- Footer Links -->
      <footer class="site-footer">
        <p>&copy; 2025 L'Oréal. All rights reserved.</p>
        <nav>
          <a href="https://www.loreal.com/en/privacy-policy/" target="_blank">Privacy Policy</a>
          <a href="https://www.loreal.com/en/terms-and-conditions/" target="_blank">Terms of Use</a>
          <a href="https://www.loreal.com/en/contact-us/" target="_blank">Contact</a>
        </nav>
      </footer>
    </div>
    <script src="script.js"></script>
  </body>
</html>
